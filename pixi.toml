[workspace]
name = "freecad"
homepage = "https://freecad.org"
repository = "https://github.com/FreeCAD/FreeCAD"
version = "1.1.0dev"
description = "pixi instructions for FreeCAD"
channels = [
    "https://prefix.dev/pixi-build-backends",
    "https://prefix.dev/conda-forge",
]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
blas = "*"
calculix = "*"
ccache = "*"
cmake = "*"
coin3d = "*"
compilers = "*"
debugpy = "*"
docutils = "*"
doxygen = "*"
eigen = "*"
fmt = "*"
freetype = "*"
git = "*"
gmsh = "*"
graphviz = "*"
hdf5 = "*"
jinja2 = "*"
libboost-devel = "*"
lxml = "*"
matplotlib = "*"
nine = "*"
ninja = "*"
noqt5 = "*"
numpy = "*"
occt = "*"
olefile = "*"
opencamlib = "*"
opencv = "*"
openssl = "*"
pandas = "*"
pcl = "*"
pip = "*"
pivy = "*"
pixi-pack = "*"
ply = "*"
pre-commit = "*"
pybind11 = "*"
pycollada = "*"
pyside6 = "*"
python = ">=3.13"
pyyaml = "*"
qt6-main = "*"
rattler-build = "*"
requests = "*"
scipy = "*"
six = "*"
smesh = "*"
swig = "*"
vtk = "*"
xerces-c = "*"
xlutils = "*"
yaml-cpp = "*"
zlib = "*"

