## macOS Dependencies (Intel)
[target.osx-64.dependencies]
# blas = { version = "*", build = "blis" }
blas = { version = "*", build = "accelerate" }
dmgbuild = "*"
sed = "*"

## macOS Dependencies (Apple Silicon)
[target.osx-arm64.dependencies]
blas = { version = "*", build = "accelerate" }
dmgbuild = "*"
sed = "*"

## Qt 6 Configuration Presets
[target.linux-64.tasks]
configure = { cmd = ["cmake", "-B", "build", "--preset", "conda-linux-debug"], depends-on = ["initialize"] }
onfigure-debug = { cmd = ["cmake", "-B", "build", "--preset", "conda-linux-debug"], depends-on = ["initialize"] }
configure-release = { cmd = [ "cmake", "-B", "build", "--preset", "conda-linux-release"], depends-on = ["initialize"] }

[target.linux-aarch64.tasks]
configure = { cmd = ["cmake", "-B", "build", "--preset", "conda-linux-debug"], depends-on = ["initialize"] }
configure-debug = { cmd = ["cmake", "-B", "build", "--preset", "conda-linux-debug"], depends-on = ["initialize"] }
configure-release = { cmd = ["cmake", "-B", "build", "--preset", "conda-linux-release"], depends-on = ["initialize"] }

[target.osx-64.tasks]
configure = { cmd = ["cmake", "-B", "build", "--preset", "conda-macos-debug"], depends-on = ["initialize"] }
configure-debug = { cmd = ["cmake", "-B", "build", "--preset", "conda-macos-debug"], depends-on = ["initialize"] }
configure-release = { cmd = ["cmake", "-B", "build", "--preset", "conda-macos-release"], depends-on = ["initialize"] }

[target.osx-arm64.tasks]
configure = { cmd = ["cmake", "-B", "build", "--preset", "conda-macos-debug"], depends-on = ["initialize"] }
configure-debug = { cmd = ["cmake", "-B", "build", "--preset", "conda-macos-debug"], depends-on = ["initialize"] }
configure-release = { cmd = ["cmake", "-B", "build", "--preset", "conda-macos-release"], depends-on = ["initialize"] }

[target.win-64.tasks]
configure = { cmd = ["cmake", "-B", "build", "--preset", "conda-windows-debug"], depends-on = ["initialize"] }
configure-debug = { cmd = ["cmake", "-B", "build", "--preset", "conda-windows-debug"], depends-on = ["initialize"] }
configure-release = { cmd = ["cmake", "-B", "build", "--preset", "conda-windows-release"], depends-on = ["initialize"] }
freecad = { cmd = [".pixi/envs/default/Library/bin/FreeCAD.exe"], depends-on = ["install"] }

## Tasks
[tasks]
initialize = { cmd = ["git", "submodule", "update", "--init", "--recursive"] }
build = { cmd = ["cmake", "--build", "build"] }
install = { cmd = ["cmake", "--install", "build"] }
test = { cmd = ["ctest", "--test-dir", "build"] }
freecad = "build/bin/FreeCAD"
