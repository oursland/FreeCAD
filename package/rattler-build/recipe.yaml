context:
  version: "1.1.0dev"

package:
  name: FreeCAD
  version: "${{ version }}"

source:
  path: ../..
  use_gitignore: true

build:
  number: 0

requirements:
  build:
    - cmake
    - compilers
    - doxygen
    - ninja
    - noqt5
    - python
    - qt6-main
    - swig

    - if: linux
      then:
        - kernel-headers_linux-64
        - libdrm-cos7-x86_64
        - libselinux-cos7-x86_64
        - libsepol-cos7-x86_64
        - libspnav
        - libx11-common-cos7-x86_64
        - libx11-cos7-x86_64
        - libxau-cos7-x86_64
        - libxcb-cos7-x86_64
        - libxdamage-cos7-x86_64
        - libxext-cos7-x86_64
        - libxfixes-cos7-x86_64
        - libxi-cos7-x86_64
        - libxi-devel-cos7-x86_64
        - libxxf86vm-cos7-x86_64
        - mesa-dri-drivers-cos7-x86_64
        - mesa-libegl-cos7-x86_64
        - mesa-libegl-devel-cos7-x86_64
        - mesa-libgl-cos7-x86_64
        - mesa-libgl-devel-cos7-x86_64
        - pixman-cos7-x86_64
        - sed
        - sysroot_linux-64
        - xorg-x11-server-common-cos7-x86_64
        - xorg-x11-server-xvfb-cos7-x86_64
        - xorg-xproto

    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}

  host:
    - coin3d
    - eigen
    - fmt
    - freetype
    - hdf5
    - libboost-devel
    - matplotlib-base
    - noqt5
    - occt
    - pcl
    - pivy
    - ply
    - pybind11
    - pyside6
    - python
    - qt6-main
    - six
    - smesh
    - vtk
    - xerces-c
    - yaml-cpp
    - zlib

    - if: windows
      then:
        - tbb-devel

    - if: unix
      then:
        - sed

    - if: linux
      then:
        - libspnav
        - xorg-xproto

    - if: osx
      then:
        - blas * accelerate*

  run:
    - graphviz
    - gmsh
    - numpy
    - python
    - pyside6
    - pivy
    - pyyaml
    - ply
    - six

    - if: linux
      then:
        - libspnav
